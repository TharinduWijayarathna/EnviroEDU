<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Am I? - EnviroEdu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #5a6268;
            transform: translateX(-3px);
        }

        .title {
            color: #2c3e50;
            font-size: 1.8em;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .clues-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .clue-bubbles {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .clue-bubble {
            background: #e9ecef;
            padding: 15px 25px;
            border-radius: 25px;
            color: #2c3e50;
            font-size: 1em;
            font-weight: 500;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .mystery-icon {
            font-size: 5em;
            margin: 20px 0;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .answer-btn {
            background: white;
            border: 3px solid #e0e0e0;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .answer-btn:hover {
            border-color: #667eea;
            background: #f8f9fa;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .answer-btn.selected {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .answer-btn.correct {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }

        .answer-btn.incorrect {
            background: #dc3545;
            border-color: #dc3545;
            color: white;
        }

        .answer-icon {
            font-size: 1.5em;
        }

        .hint-section {
            text-align: center;
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #856404;
            font-size: 1.1em;
            font-weight: 500;
        }

        .next-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
            transition: all 0.3s ease;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .result-message {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            display: none;
        }

        .result-message.show {
            display: block;
        }

        .result-message.correct {
            background: #d4edda;
            color: #155724;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .clue-bubbles {
                flex-direction: column;
            }

            .answers-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='student-dashboard.html'">
                ◀ Back
            </button>
            <h1 class="title">Who Am I?</h1>
        </div>

        <div class="clues-section">
            <div class="clue-bubbles">
                <div class="clue-bubble">I can fly</div>
                <div class="clue-bubble">I build a nest</div>
                <div class="clue-bubble">I chirp</div>
            </div>

            <div class="mystery-icon">
                🦜<br>❓
            </div>
        </div>

        <div class="answers-grid">
            <button class="answer-btn" onclick="selectAnswer(this, 'car')">
                <span class="answer-icon">❌</span>
                Car
            </button>
            <button class="answer-btn" onclick="selectAnswer(this, 'bird')">
                <span class="answer-icon">✓</span>
                Bird
            </button>
            <button class="answer-btn" onclick="selectAnswer(this, 'rock')">
                <span class="answer-icon">❌</span>
                Rock
            </button>
            <button class="answer-btn" onclick="selectAnswer(this, 'clock')">
                <span class="answer-icon">🕐</span>
                Clock
            </button>
        </div>

        <div class="hint-section">
            Hint: I live in trees
        </div>

        <div id="result" class="result-message"></div>

        <button class="next-btn" onclick="nextQuestion()">Next Question</button>
    </div>

    <script>
        let answered = false;

        function selectAnswer(button, answer) {
            if (answered) return;

            answered = true;
            const buttons = document.querySelectorAll('.answer-btn');
            const resultDiv = document.getElementById('result');

            buttons.forEach(btn => {
                btn.style.pointerEvents = 'none';
            });

            if (answer === 'bird') {
                button.classList.add('correct');
                resultDiv.className = 'result-message show correct';
                resultDiv.textContent = '🎉 Correct! I am a bird!';
            } else {
                button.classList.add('incorrect');
                // Show the correct answer
                buttons.forEach(btn => {
                    if (btn.textContent.includes('Bird')) {
                        btn.classList.add('correct');
                    }
                });
                resultDiv.className = 'result-message show';
                resultDiv.style.background = '#f8d7da';
                resultDiv.style.color = '#721c24';
                resultDiv.textContent = '❌ Not quite! The correct answer is Bird.';
            }
        }

        function nextQuestion() {
            // In a real app, this would load the next question
            alert('Great job! Moving to the next question...');
            window.location.href = 'student-dashboard.html';
        }
    </script>
</body>
</html>

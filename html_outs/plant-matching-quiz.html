<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Matching Quiz - EnviroEdu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #5a6268;
            transform: translateX(-3px);
        }

        .title {
            color: #2c3e50;
            font-size: 1.8em;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .instruction {
            text-align: center;
            color: #6c757d;
            font-size: 1.1em;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .matching-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .category-column {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #e0e0e0;
        }

        .category-header {
            text-align: center;
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
        }

        .category-title {
            color: #2c3e50;
            font-size: 1.2em;
            font-weight: 600;
        }

        .items-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 300px;
        }

        .match-item {
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.1em;
            cursor: move;
            transition: all 0.3s ease;
        }

        .match-item:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .match-item.dragging {
            opacity: 0.5;
        }

        .drop-zone {
            min-height: 60px;
            border: 2px dashed #adb5bd;
            border-radius: 8px;
            padding: 10px;
            transition: all 0.3s ease;
        }

        .drop-zone.drag-over {
            background: #d4edda;
            border-color: #28a745;
        }

        .item-icon {
            font-size: 1.5em;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .score-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .score-item {
            color: #2c3e50;
            font-size: 1.1em;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .matching-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='student-dashboard.html'">
                ◀ Back
            </button>
            <h1 class="title">Plant Matching Quiz</h1>
        </div>

        <p class="instruction">
            Match the plant with its proper use! 
            <span style="font-size: 1.5em;">🌾📋</span>
        </p>

        <div class="matching-grid">
            <!-- Food Column -->
            <div class="category-column">
                <div class="category-header">
                    <div class="category-title">Food</div>
                </div>
                <div class="items-container drop-zone" id="food" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <div class="match-item" draggable="true" ondragstart="drag(event)" data-category="food">
                        <span class="item-icon">🥔</span>
                        <span>Potato</span>
                    </div>
                    <div class="match-item" draggable="true" ondragstart="drag(event)" data-category="food">
                        <span class="item-icon">🍎</span>
                        <span>Apple</span>
                    </div>
                    <div class="match-item" draggable="true" ondragstart="drag(event)" data-category="food">
                        <span class="item-icon">🏢</span>
                        <span>Building</span>
                    </div>
                    <div class="match-item" draggable="true" ondragstart="drag(event)" data-category="food">
                        <span class="item-icon">🌾</span>
                        <span>Wheat</span>
                    </div>
                </div>
            </div>

            <!-- Medicine Column -->
            <div class="category-column">
                <div class="category-header">
                    <div class="category-title">Medicine</div>
                </div>
                <div class="items-container drop-zone" id="medicine" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <div class="match-item" draggable="true" ondragstart="drag(event)" data-category="medicine">
                        <span class="item-icon">🪴</span>
                        <span>Aloe</span>
                    </div>
                    <div class="match-item" draggable="true" ondragstart="drag(event)" data-category="medicine">
                        <span class="item-icon">💊</span>
                        <span>Herbs</span>
                    </div>
                    <div class="match-item" draggable="true" ondragstart="drag(event)" data-category="medicine">
                        <span class="item-icon">🔬</span>
                        <span>Extract</span>
                    </div>
                </div>
            </div>

            <!-- Building Column -->
            <div class="category-column">
                <div class="category-header">
                    <div class="category-title">Building</div>
                </div>
                <div class="items-container drop-zone" id="building" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <div class="match-item" draggable="true" ondragstart="drag(event)" data-category="building">
                        <span class="item-icon">🪵</span>
                        <span>Food</span>
                    </div>
                    <div class="match-item" draggable="true" ondragstart="drag(event)" data-category="building">
                        <span class="item-icon">🛠️</span>
                        <span>Medicine</span>
                    </div>
                    <div class="match-item" draggable="true" ondragstart="drag(event)" data-category="building">
                        <span class="item-icon">🏗️</span>
                        <span>Building</span>
                    </div>
                </div>
            </div>
        </div>

        <button class="submit-btn" onclick="checkAnswers()">Submit</button>

        <div class="score-section">
            <div class="score-item">+10 Points</div>
            <div class="score-item">|</div>
            <div class="score-item">Level 2</div>
        </div>
    </div>

    <script>
        function drag(event) {
            event.dataTransfer.setData('text', event.target.outerHTML);
            event.dataTransfer.setData('category', event.target.dataset.category);
            event.target.classList.add('dragging');
        }

        function allowDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.add('drag-over');
        }

        function dragLeave(event) {
            event.currentTarget.classList.remove('drag-over');
        }

        function drop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            
            const data = event.dataTransfer.getData('text');
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = data;
            const droppedElement = tempDiv.firstChild;
            
            // Remove the dragging class
            droppedElement.classList.remove('dragging');
            
            // Find and remove the original element
            const draggingElement = document.querySelector('.dragging');
            if (draggingElement) {
                draggingElement.remove();
            }
            
            // Add to new location
            event.currentTarget.appendChild(droppedElement);
        }

        function checkAnswers() {
            alert('Great job matching the plants to their uses! Your answers have been submitted.');
            // In a real app, this would validate the answers
        }
    </script>
</body>
</html>

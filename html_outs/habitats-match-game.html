<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitats Match Game - EnviroEdu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #5a6268;
            transform: translateX(-3px);
        }

        .title {
            color: #2c3e50;
            font-size: 1.8em;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .instruction {
            text-align: center;
            color: #6c757d;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .habitats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .habitat-card {
            background: #f8f9fa;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .habitat-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .habitat-header {
            padding: 12px;
            background: white;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 2px solid #dee2e6;
        }

        .habitat-name {
            color: #2c3e50;
            font-size: 1.3em;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .habitat-scene {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border-radius: 12px;
            padding: 30px 20px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            margin-bottom: 15px;
        }

        .habitat-animals {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            min-height: 80px;
            padding: 10px;
            background: white;
            border-radius: 10px;
            border: 2px dashed #dee2e6;
        }

        .available-animals {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid #e0e0e0;
        }

        .animals-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            justify-items: center;
        }

        .animal-item {
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 15px;
            font-size: 2.5em;
            cursor: grab;
            transition: all 0.3s ease;
        }

        .animal-item:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .animal-item:active {
            cursor: grabbing;
        }

        .animal-item.dragging {
            opacity: 0.5;
        }

        .score-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .score-item {
            color: #2c3e50;
            font-size: 1.2em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .habitats-grid {
                grid-template-columns: 1fr;
            }

            .animals-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='student-dashboard.html'">
                ◀ Back
            </button>
            <h1 class="title">Habitats Match Game</h1>
        </div>

        <p class="instruction">Match the animals to their correct habitats!</p>

        <div class="habitats-grid">
            <!-- Jungle -->
            <div class="habitat-card">
                <div class="habitat-header">
                    <div class="habitat-name">
                        Jungle
                    </div>
                </div>
                <div class="habitat-scene">🌴🌿</div>
                <div class="habitat-animals drop-zone" id="jungle" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <!-- Farm -->
            <div class="habitat-card">
                <div class="habitat-header">
                    <div class="habitat-name">
                        🎵 Farm
                    </div>
                </div>
                <div class="habitat-scene" style="background: linear-gradient(135deg, #fff9c4 0%, #ffeb3b 100%);">🌾🏡</div>
                <div class="habitat-animals drop-zone" id="farm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <!-- Ocean -->
            <div class="habitat-card">
                <div class="habitat-header">
                    <div class="habitat-name">
                        Ocean
                    </div>
                </div>
                <div class="habitat-scene" style="background: linear-gradient(135deg, #b3e5fc 0%, #4fc3f7 100%);">🌊🐚</div>
                <div class="habitat-animals drop-zone" id="ocean" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>
        </div>

        <div class="available-animals">
            <div class="animals-grid">
                <div class="animal-item" draggable="true" ondragstart="drag(event)" data-habitat="jungle">🐘</div>
                <div class="animal-item" draggable="true" ondragstart="drag(event)" data-habitat="farm">🚗</div>
                <div class="animal-item" draggable="true" ondragstart="drag(event)" data-habitat="farm">🐄</div>
                <div class="animal-item" draggable="true" ondragstart="drag(event)" data-habitat="ocean">🦝</div>
                <div class="animal-item" draggable="true" ondragstart="drag(event)" data-habitat="ocean">🐢</div>
                <div class="animal-item" draggable="true" ondragstart="drag(event)" data-habitat="jungle">🦜</div>
            </div>
        </div>

        <div class="score-section">
            <div class="score-item">
                Points: 201
            </div>
            <div class="score-item">
                Level 3
            </div>
        </div>
    </div>

    <script>
        function drag(event) {
            event.dataTransfer.setData('text', event.target.outerHTML);
            event.dataTransfer.setData('habitat', event.target.dataset.habitat);
            event.target.classList.add('dragging');
            setTimeout(() => {
                const draggingElement = document.querySelector('.dragging');
                if (draggingElement && draggingElement.parentElement.classList.contains('animals-grid')) {
                    draggingElement.style.display = 'none';
                }
            }, 0);
        }

        function allowDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.add('drag-over');
        }

        function dragLeave(event) {
            if (!event.currentTarget.contains(event.relatedTarget)) {
                event.currentTarget.classList.remove('drag-over');
            }
        }

        function drop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            
            const data = event.dataTransfer.getData('text');
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = data;
            const droppedElement = tempDiv.firstChild;
            
            // Remove dragging class
            droppedElement.classList.remove('dragging');
            droppedElement.style.display = '';
            
            // Remove from original location
            const draggingElement = document.querySelector('.dragging');
            if (draggingElement) {
                draggingElement.remove();
            }
            
            // Add to drop zone
            event.currentTarget.appendChild(droppedElement);
        }
    </script>
</body>
</html>

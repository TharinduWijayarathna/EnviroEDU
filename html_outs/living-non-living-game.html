<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living and Non-Living Things - EnviroEdu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #5a6268;
            transform: translateX(-3px);
        }

        .title {
            color: #2c3e50;
            font-size: 1.8em;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .instruction {
            text-align: center;
            color: #6c757d;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .categories {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .category-box {
            background: #e9ecef;
            border: 3px dashed #adb5bd;
            border-radius: 12px;
            padding: 20px;
            min-height: 250px;
            transition: all 0.3s ease;
        }

        .category-box.drag-over {
            background: #d4edda;
            border-color: #28a745;
        }

        .category-title {
            color: #2c3e50;
            font-size: 1.3em;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #adb5bd;
        }

        .items-area {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            min-height: 180px;
        }

        .item {
            width: 80px;
            height: 80px;
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            cursor: move;
            transition: all 0.3s ease;
            user-select: none;
        }

        .item:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .item.dragging {
            opacity: 0.5;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .result-message {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            display: none;
        }

        .result-message.show {
            display: block;
        }

        .result-message.correct {
            background: #d4edda;
            color: #155724;
        }

        .result-message.incorrect {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .categories {
                grid-template-columns: 1fr;
            }

            .item {
                width: 70px;
                height: 70px;
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='student-dashboard.html'">
                ◀ Back
            </button>
            <h1 class="title">Living and Non-Living Things</h1>
        </div>

        <p class="instruction">Drag the items into the correct categories!</p>

        <div class="categories">
            <div class="category-box" id="living" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="category-title">Living</div>
                <div class="items-area" id="living-items"></div>
            </div>

            <div class="category-box" id="non-living" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="category-title">Non-Living</div>
                <div class="items-area" id="non-living-items"></div>
            </div>
        </div>

        <button class="submit-btn" onclick="checkAnswers()">Submit</button>

        <div id="result" class="result-message"></div>
    </div>

    <script>
        // Define items with their categories
        const items = [
            { emoji: '🌳', category: 'living', id: 'tree' },
            { emoji: '🐱', category: 'living', id: 'cat' },
            { emoji: '🪨', category: 'non-living', id: 'rock1' },
            { emoji: '🪨', category: 'non-living', id: 'rock2' }
        ];

        // Initialize the game
        function initGame() {
            const livingArea = document.getElementById('living-items');
            const nonLivingArea = document.getElementById('non-living-items');

            // Add living items
            items.filter(item => item.category === 'living').forEach(item => {
                const itemDiv = createItemElement(item);
                livingArea.appendChild(itemDiv);
            });

            // Add non-living items
            items.filter(item => item.category === 'non-living').forEach(item => {
                const itemDiv = createItemElement(item);
                nonLivingArea.appendChild(itemDiv);
            });
        }

        function createItemElement(item) {
            const div = document.createElement('div');
            div.className = 'item';
            div.draggable = true;
            div.textContent = item.emoji;
            div.dataset.id = item.id;
            div.dataset.category = item.category;
            div.ondragstart = drag;
            return div;
        }

        function drag(event) {
            event.dataTransfer.setData('text', event.target.dataset.id);
            event.target.classList.add('dragging');
        }

        function allowDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.add('drag-over');
        }

        function dragLeave(event) {
            event.currentTarget.classList.remove('drag-over');
        }

        function drop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            
            const itemId = event.dataTransfer.getData('text');
            const draggedElement = document.querySelector(`[data-id="${itemId}"]`);
            
            if (draggedElement) {
                draggedElement.classList.remove('dragging');
                const targetArea = event.currentTarget.querySelector('.items-area');
                targetArea.appendChild(draggedElement);
            }
        }

        function checkAnswers() {
            const livingArea = document.getElementById('living-items');
            const nonLivingArea = document.getElementById('non-living-items');
            const resultDiv = document.getElementById('result');

            const livingItems = Array.from(livingArea.children);
            const nonLivingItems = Array.from(nonLivingArea.children);

            let correct = true;

            // Check living items
            livingItems.forEach(item => {
                if (item.dataset.category !== 'living') {
                    correct = false;
                }
            });

            // Check non-living items
            nonLivingItems.forEach(item => {
                if (item.dataset.category !== 'non-living') {
                    correct = false;
                }
            });

            if (correct && livingItems.length === 2 && nonLivingItems.length === 2) {
                resultDiv.className = 'result-message show correct';
                resultDiv.textContent = '🎉 Excellent! All items are in the correct categories!';
            } else {
                resultDiv.className = 'result-message show incorrect';
                resultDiv.textContent = '❌ Not quite right. Try again!';
            }
        }

        // Initialize game on load
        initGame();
    </script>
</body>
</html>

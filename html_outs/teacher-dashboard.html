<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - EnviroEdu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #f0f0f0;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1em;
        }

        .dashboard-title {
            color: #2c3e50;
            font-size: 1.8em;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .action-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 35px 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
        }

        .action-icon {
            font-size: 3em;
            margin-bottom: 15px;
            color: #667eea;
        }

        .action-card h3 {
            color: #2c3e50;
            font-size: 1.2em;
            font-weight: 600;
        }

        .class-overview {
            margin-bottom: 30px;
        }

        .class-overview h2 {
            color: #2c3e50;
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        .class-list {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border: 2px solid #e0e0e0;
        }

        .student-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .student-item:last-child {
            border-bottom: none;
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .student-bullet {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
        }

        .student-name {
            color: #2c3e50;
            font-size: 1.1em;
            font-weight: 500;
            min-width: 80px;
        }

        .progress-bar-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .progress-percentage {
            color: #667eea;
            font-weight: 600;
            min-width: 50px;
        }

        .progress-bar-small {
            flex: 1;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill-small {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .progress-indicator {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        .footer-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .footer-left {
            display: flex;
            gap: 15px;
        }

        .settings-btn, .logout-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .settings-btn:hover, .logout-btn:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .view-report-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .view-report-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .action-grid {
                grid-template-columns: 1fr;
            }

            .footer-buttons {
                flex-direction: column;
            }

            .footer-left {
                width: 100%;
                justify-content: center;
            }

            .view-report-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>EnviroEdu</h1>
            <p>Engaging Environmental Learning</p>
        </div>

        <h2 class="dashboard-title">Teacher Dashboard</h2>

        <div class="action-grid">
            <div class="action-card" onclick="window.location.href='upload-video-lesson.html'">
                <div class="action-icon">📤</div>
                <h3>Upload Video Lesson</h3>
            </div>

            <div class="action-card" onclick="alert('Feature coming soon!')">
                <div class="action-icon">🎮</div>
                <h3>Assign Games & Quizzes</h3>
            </div>

            <div class="action-card" onclick="alert('Feature coming soon!')">
                <div class="action-icon">📋</div>
                <h3>Manage Students</h3>
            </div>

            <div class="action-card" onclick="window.location.href='student-progress-report.html'">
                <div class="action-icon">📊</div>
                <h3>View Progress Reports</h3>
            </div>
        </div>

        <div class="class-overview">
            <h2>Class Overview</h2>
            <div class="class-list">
                <div class="student-item">
                    <div class="student-info">
                        <span class="student-bullet"></span>
                        <span class="student-name">Neha</span>
                        <span class="progress-percentage">60%</span>
                    </div>
                    <div class="progress-bar-wrapper">
                        <div class="progress-bar-small">
                            <div class="progress-fill-small" style="width: 60%"></div>
                        </div>
                        <span class="progress-indicator">● 50%</span>
                    </div>
                </div>

                <div class="student-item">
                    <div class="student-info">
                        <span class="student-bullet"></span>
                        <span class="student-name">Ravi</span>
                        <span class="progress-percentage">45%</span>
                    </div>
                    <div class="progress-bar-wrapper">
                        <div class="progress-bar-small">
                            <div class="progress-fill-small" style="width: 45%"></div>
                        </div>
                        <span class="progress-indicator">▲ 45%</span>
                    </div>
                </div>

                <div class="student-item">
                    <div class="student-info">
                        <span class="student-bullet"></span>
                        <span class="student-name">Aanya</span>
                        <span class="progress-percentage">90%</span>
                    </div>
                    <div class="progress-bar-wrapper">
                        <div class="progress-bar-small">
                            <div class="progress-fill-small" style="width: 90%"></div>
                        </div>
                        <span class="progress-indicator">▲ 90%</span>
                    </div>
                </div>

                <div class="student-item">
                    <div class="student-info">
                        <span class="student-bullet"></span>
                        <span class="student-name">Lalith</span>
                        <span class="progress-percentage">30%</span>
                    </div>
                    <div class="progress-bar-wrapper">
                        <div class="progress-bar-small">
                            <div class="progress-fill-small" style="width: 30%"></div>
                        </div>
                        <span class="progress-indicator">30%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-buttons">
            <div class="footer-left">
                <button class="settings-btn">⚙️ Settings</button>
                <button class="logout-btn" onclick="window.location.href='login.html'">➜ Logout</button>
            </div>
            <button class="view-report-btn" onclick="window.location.href='student-progress-report.html'">View Full Report</button>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Lesson - Plant Parts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #f0f0f0;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .lesson-title {
            color: #34495e;
            font-size: 1.8em;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .video-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }

        .video-placeholder {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
        }

        .video-placeholder:hover {
            transform: scale(1.02);
        }

        .play-button {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            color: #667eea;
            transition: all 0.3s ease;
        }

        .video-placeholder:hover .play-button {
            transform: scale(1.1);
            background: white;
        }

        .video-controls {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s ease;
        }

        .control-btn:hover {
            background: #764ba2;
        }

        .progress-slider {
            flex: 1;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            border-radius: 3px;
            width: 30%;
        }

        .key-points {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
        }

        .key-points h3 {
            color: #2c3e50;
            font-size: 1.4em;
            margin-bottom: 20px;
        }

        .key-points ul {
            list-style: none;
            padding: 0;
        }

        .key-points li {
            color: #34495e;
            font-size: 1em;
            line-height: 1.8;
            padding: 12px 0;
            padding-left: 30px;
            position: relative;
        }

        .key-points li:before {
            content: "•";
            color: #667eea;
            font-size: 1.5em;
            position: absolute;
            left: 0;
            top: 8px;
        }

        .quiz-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 20px auto 0;
            display: block;
            transition: all 0.3s ease;
        }

        .quiz-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .content-wrapper {
                grid-template-columns: 1fr;
            }

            .play-button {
                width: 60px;
                height: 60px;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Video Lesson Page</h1>
        </div>

        <h2 class="lesson-title">Plant Parts</h2>

        <div class="content-wrapper">
            <div class="video-section">
                <div class="video-placeholder" onclick="playVideo()">
                    <div class="play-button">▶</div>
                </div>
                <div class="video-controls">
                    <button class="control-btn">◀◀</button>
                    <button class="control-btn" id="playPauseBtn">▶</button>
                    <div class="progress-slider">
                        <div class="progress-fill"></div>
                    </div>
                    <button class="control-btn">▶▶</button>
                </div>
            </div>

            <div class="key-points">
                <h3>Key Points</h3>
                <ul>
                    <li>Roots absorb water.</li>
                    <li>The stem supports the plant.</li>
                    <li>Leaves make food.</li>
                </ul>
            </div>
        </div>

        <button class="quiz-button" onclick="window.location.href='quiz-game.html'">Start Quiz</button>
    </div>

    <script>
        let isPlaying = false;

        function playVideo() {
            const playPauseBtn = document.getElementById('playPauseBtn');
            isPlaying = !isPlaying;
            playPauseBtn.textContent = isPlaying ? '❚❚' : '▶';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Saver Challenge - EnviroEdu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 750px;
            width: 100%;
            padding: 40px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #5a6268;
            transform: translateX(-3px);
        }

        .title {
            color: #2c3e50;
            font-size: 1.8em;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .instruction {
            text-align: center;
            color: #2c3e50;
            font-size: 1.2em;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .option-card {
            background: #f8f9fa;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-card:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .option-card.selected {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .option-card.correct {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }

        .option-card.incorrect {
            background: #dc3545;
            border-color: #dc3545;
            color: white;
        }

        .option-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            flex-shrink: 0;
        }

        .option-card.selected .option-icon,
        .option-card.correct .option-icon {
            background: rgba(255, 255, 255, 0.9);
        }

        .option-text {
            flex: 1;
            font-size: 1.2em;
            font-weight: 500;
        }

        .check-icon {
            font-size: 2em;
            display: none;
        }

        .option-card.correct .check-icon {
            display: block;
        }

        .feedback-section {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
        }

        .feedback-section.show {
            display: block;
        }

        .feedback-section.correct {
            background: #d4edda;
            color: #155724;
        }

        .feedback-section.incorrect {
            background: #f8d7da;
            color: #721c24;
        }

        .next-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 50px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
            transition: all 0.3s ease;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .water-animation {
            text-align: center;
            font-size: 4em;
            margin-bottom: 20px;
            animation: wave 2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .option-card {
                padding: 20px;
            }

            .option-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='student-dashboard.html'">
                ◀ Back
            </button>
            <h1 class="title">Water Saver Challenge</h1>
        </div>

        <div class="water-animation">💧🚿</div>

        <p class="instruction">Choose the action that saves water.</p>

        <div class="options-container">
            <div class="option-card" onclick="selectOption(this, true)">
                <div class="option-icon">✓</div>
                <div class="option-text">Turn off the tap while brushing</div>
                <div class="check-icon">✓</div>
            </div>

            <div class="option-card" onclick="selectOption(this, false)">
                <div class="option-icon">✗</div>
                <div class="option-text">Leave the tap running while brushing</div>
                <div class="check-icon">✓</div>
            </div>
        </div>

        <div id="feedback" class="feedback-section"></div>

        <button class="next-btn" onclick="nextQuestion()">Next Challenge</button>
    </div>

    <script>
        let answered = false;

        function selectOption(card, isCorrect) {
            if (answered) return;

            answered = true;
            const cards = document.querySelectorAll('.option-card');
            const feedbackDiv = document.getElementById('feedback');

            cards.forEach(c => {
                c.style.pointerEvents = 'none';
            });

            if (isCorrect) {
                card.classList.add('correct');
                feedbackDiv.className = 'feedback-section show correct';
                feedbackDiv.innerHTML = '🎉 Excellent! You saved water! +10 Points';
            } else {
                card.classList.add('incorrect');
                // Show the correct answer
                cards.forEach(c => {
                    if (c.onclick.toString().includes('true')) {
                        c.classList.add('correct');
                    }
                });
                feedbackDiv.className = 'feedback-section show incorrect';
                feedbackDiv.innerHTML = '💧 Not quite! Turning off the tap saves water.';
            }
        }

        function nextQuestion() {
            alert('Great job being a water saver! Moving to next challenge...');
            window.location.href = 'student-dashboard.html';
        }
    </script>
</body>
</html>

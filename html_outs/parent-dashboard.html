<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - EnviroEdu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #f0f0f0;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .section {
            margin-bottom: 35px;
        }

        .section-title {
            color: #2c3e50;
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .activity-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border: 2px solid #e0e0e0;
        }

        .activity-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-bullet {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            margin-right: 15px;
        }

        .activity-text {
            color: #2c3e50;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .performance-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border: 2px solid #e0e0e0;
        }

        .score-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .score-label {
            color: #2c3e50;
            font-size: 1.3em;
            font-weight: 600;
        }

        .score-value {
            color: #667eea;
            font-size: 2em;
            font-weight: 700;
        }

        .badges-section {
            margin-top: 25px;
        }

        .badges-label {
            color: #2c3e50;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
        }

        .badge-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .badge-card:hover {
            transform: scale(1.05);
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .badge-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .badge-name {
            color: #2c3e50;
            font-weight: 600;
            font-size: 1em;
        }

        .logout-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            display: block;
            margin: 30px auto 0;
            transition: all 0.3s ease;
        }

        .logout-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .score-section {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .badges-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Parent Dashboard</h1>
        </div>

        <div class="section">
            <h2 class="section-title">Child's Progress Overview</h2>
            
            <div class="activity-box">
                <h3 style="color: #2c3e50; font-size: 1.2em; margin-bottom: 15px;">Recent Activity</h3>
                
                <div class="activity-item">
                    <div class="activity-bullet"></div>
                    <span class="activity-text">Completed: Water Quiz</span>
                </div>

                <div class="activity-item">
                    <div class="activity-bullet"></div>
                    <span class="activity-text">Watched: Plant Parts Video</span>
                </div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Performance Report</h2>
            
            <div class="performance-box">
                <div class="score-section">
                    <span class="score-label">Score:</span>
                    <span class="score-value">85%</span>
                </div>

                <div class="badges-section">
                    <div class="badges-label">Badges Earned:</div>
                    
                    <div class="badges-grid">
                        <div class="badge-card">
                            <div class="badge-icon">♻️</div>
                            <div class="badge-name">Eco Hero</div>
                        </div>

                        <div class="badge-card">
                            <div class="badge-icon">🌱</div>
                            <div class="badge-name">Water Saver</div>
                        </div>

                        <div class="badge-card">
                            <div class="badge-icon">🐾</div>
                            <div class="badge-name">Animal Friend</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="logout-button" onclick="window.location.href='login.html'">
            Logout
        </button>
    </div>
</body>
</html>

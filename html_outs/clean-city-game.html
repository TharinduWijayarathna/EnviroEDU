<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean the City Game - EnviroEdu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #5a6268;
            transform: translateX(-3px);
        }

        .title {
            color: #2c3e50;
            font-size: 1.8em;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .instruction {
            text-align: center;
            color: #6c757d;
            font-size: 1.2em;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .trash-icon {
            font-size: 1.5em;
        }

        .city-scene {
            background: linear-gradient(135deg, #e3f2fd 0%, #90caf9 100%);
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            padding: 40px 30px;
            min-height: 400px;
            position: relative;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .cityscape {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 200px;
            margin-bottom: 30px;
        }

        .building {
            font-size: 4em;
            opacity: 0.8;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .garbage-items {
            position: relative;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .garbage-item {
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #ff9800;
            border-radius: 12px;
            padding: 15px;
            font-size: 2.5em;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: bounce 2s ease-in-out infinite;
        }

        .garbage-item:hover {
            transform: scale(1.2) rotate(10deg);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .garbage-item.collected {
            animation: collect 0.5s ease forwards;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes collect {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.3) rotate(180deg); opacity: 0.5; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        .score-panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            color: #6c757d;
            font-size: 1em;
            margin-bottom: 5px;
        }

        .score-value {
            color: #667eea;
            font-size: 1.8em;
            font-weight: 700;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 25px;
            height: 30px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            border-radius: 25px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .complete-message {
            text-align: center;
            background: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.3em;
            font-weight: 600;
            margin-top: 20px;
            display: none;
        }

        .complete-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .garbage-items {
                grid-template-columns: repeat(3, 1fr);
            }

            .building {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='student-dashboard.html'">
                ◀ Back
            </button>
            <h1 class="title">Clean the City Game</h1>
        </div>

        <p class="instruction">
            Click on the garbage to clean the city!
            <span class="trash-icon">🗑️</span>
        </p>

        <div class="score-panel">
            <div class="score-item">
                <div class="score-label">Items Collected</div>
                <div class="score-value" id="collected">0 / 12</div>
            </div>
            <div class="score-item">
                <div class="score-label">Points</div>
                <div class="score-value" id="points">0</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress">0%</div>
        </div>

        <div class="city-scene">
            <div class="cityscape">
                <div class="building">🏢</div>
                <div class="building" style="animation-delay: 0.5s;">🏙️</div>
                <div class="building" style="animation-delay: 1s;">🌆</div>
                <div class="building" style="animation-delay: 1.5s;">🏗️</div>
            </div>

            <div class="garbage-items">
                <div class="garbage-item" onclick="collectGarbage(this)">🗑️</div>
                <div class="garbage-item" onclick="collectGarbage(this)">📦</div>
                <div class="garbage-item" onclick="collectGarbage(this)">🥤</div>
                <div class="garbage-item" onclick="collectGarbage(this)">🍔</div>
                <div class="garbage-item" onclick="collectGarbage(this)">🧃</div>
                <div class="garbage-item" onclick="collectGarbage(this)">🛒</div>
                <div class="garbage-item" onclick="collectGarbage(this)">📄</div>
                <div class="garbage-item" onclick="collectGarbage(this)">🧻</div>
                <div class="garbage-item" onclick="collectGarbage(this)">🥡</div>
                <div class="garbage-item" onclick="collectGarbage(this)">🧴</div>
                <div class="garbage-item" onclick="collectGarbage(this)">🎒</div>
                <div class="garbage-item" onclick="collectGarbage(this)">🔋</div>
            </div>
        </div>

        <div id="completeMessage" class="complete-message">
            🎉 Amazing! You cleaned the entire city! +100 Bonus Points!
        </div>
    </div>

    <script>
        let collected = 0;
        const totalItems = 12;
        let points = 0;

        function collectGarbage(element) {
            if (element.classList.contains('collected')) return;

            element.classList.add('collected');
            collected++;
            points += 10;

            // Update displays
            document.getElementById('collected').textContent = `${collected} / ${totalItems}`;
            document.getElementById('points').textContent = points;

            // Update progress bar
            const percentage = Math.round((collected / totalItems) * 100);
            const progressBar = document.getElementById('progress');
            progressBar.style.width = percentage + '%';
            progressBar.textContent = percentage + '%';

            // Remove element after animation
            setTimeout(() => {
                element.style.display = 'none';
            }, 500);

            // Check if all items collected
            if (collected === totalItems) {
                points += 100;
                document.getElementById('points').textContent = points;
                document.getElementById('completeMessage').classList.add('show');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress & Leaderboard - EnviroEdu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #f0f0f0;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            color: #2c3e50;
            font-size: 1.6em;
            font-weight: 600;
        }

        .toggle-icon {
            font-size: 1.5em;
            cursor: pointer;
            color: #667eea;
        }

        .progress-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border: 2px solid #e0e0e0;
        }

        .progress-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .progress-item:last-child {
            border-bottom: none;
        }

        .progress-label {
            color: #2c3e50;
            font-size: 1.1em;
            font-weight: 500;
        }

        .progress-value {
            color: #667eea;
            font-size: 1.1em;
            font-weight: 600;
        }

        .check-icon {
            color: #27ae60;
            font-size: 1.8em;
            margin-left: 15px;
        }

        .leaderboard-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border: 2px solid #e0e0e0;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            margin-bottom: 12px;
            background: white;
            border-radius: 10px;
            border: 2px solid #e8e8e8;
            transition: all 0.3s ease;
        }

        .leaderboard-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }

        .leaderboard-item.first {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe4b3 100%);
            border-color: #ffd700;
        }

        .leaderboard-rank {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .rank-number {
            font-size: 1.3em;
            font-weight: 700;
            color: #667eea;
            min-width: 30px;
        }

        .leaderboard-item.first .rank-number {
            color: #ffa500;
        }

        .player-name {
            color: #2c3e50;
            font-size: 1.2em;
            font-weight: 600;
        }

        .player-points {
            color: #667eea;
            font-size: 1.2em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .leaderboard-item {
                padding: 15px;
            }

            .player-name,
            .player-points {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Progress & Leaderboard Page</h1>
        </div>

        <div class="section">
            <div class="section-header">
                <h2>My Progress</h2>
                <span class="toggle-icon">📊</span>
            </div>

            <div class="progress-box">
                <div class="progress-item">
                    <span class="progress-label">Lessons Completed:</span>
                    <div style="display: flex; align-items: center;">
                        <span class="progress-value">5 / 8</span>
                        <span class="check-icon">✓</span>
                    </div>
                </div>

                <div class="progress-item">
                    <span class="progress-label">Total Points:</span>
                    <div style="display: flex; align-items: center;">
                        <span class="progress-value">350 pts</span>
                        <span class="check-icon">✓</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h2>Weekly Leaderboard</h2>
            </div>

            <div class="leaderboard-box">
                <div class="leaderboard-item first">
                    <div class="leaderboard-rank">
                        <span class="rank-number">1.</span>
                        <span class="player-name">Aanya</span>
                    </div>
                    <div class="player-points">
                        450 pts
                        <span class="check-icon">✓</span>
                    </div>
                </div>

                <div class="leaderboard-item">
                    <div class="leaderboard-rank">
                        <span class="rank-number">2.</span>
                        <span class="player-name">Ravi</span>
                    </div>
                    <div class="player-points">
                        380 pts
                        <span class="check-icon">✓</span>
                    </div>
                </div>

                <div class="leaderboard-item">
                    <div class="leaderboard-rank">
                        <span class="rank-number">3.</span>
                        <span class="player-name">Nimal</span>
                    </div>
                    <div class="player-points">
                        320 pts
                        <span class="check-icon">✓</span>
                    </div>
                </div>
            </div>
        </div>

        <button class="back-button" onclick="window.location.href='student-dashboard.html'">
            Back to Dashboard
        </button>
    </div>
</body>
</html>

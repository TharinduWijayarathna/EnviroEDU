<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Video Lesson - EnviroEdu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 3px solid #f0f0f0;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #2c3e50;
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            color: #2c3e50;
            font-size: 1em;
            font-weight: 500;
            margin-bottom: 10px;
            display: block;
        }

        .topic-input-wrapper {
            display: flex;
            gap: 10px;
        }

        .topic-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .topic-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .browse-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .browse-btn:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: #e9ecef;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #6c757d;
            font-size: 1em;
        }

        .grade-lesson-section {
            margin-bottom: 25px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .radio-option:hover {
            border-color: #667eea;
            background: #e9ecef;
        }

        .radio-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .radio-label {
            color: #2c3e50;
            font-size: 1em;
            cursor: pointer;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 1em;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .topic-input-wrapper {
                flex-direction: column;
            }

            .browse-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Upload Video Lesson</h1>
        </div>

        <form onsubmit="handleSubmit(event)">
            <div class="form-section">
                <h2 class="section-title">Upload Video Lesson</h2>

                <div class="form-group">
                    <label class="form-label">Topic Name:</label>
                    <div class="topic-input-wrapper">
                        <input 
                            type="text" 
                            class="topic-input" 
                            placeholder="Drag & drop video file or Browse..."
                            id="topicName"
                            required
                        >
                        <button type="button" class="browse-btn" onclick="document.getElementById('fileInput').click()">
                            Browse...
                        </button>
                        <input type="file" id="fileInput" accept="video/*" style="display: none;" onchange="handleFileSelect(event)">
                    </div>
                </div>

                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-icon">📤</div>
                    <p class="upload-text">Drag & drop video file or click to browse</p>
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">Select Target Grade & Lesson</h2>

                <div class="grade-lesson-section">
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="grade" value="grade4" id="grade4" required>
                            <span class="radio-label">▶ Grade 4 (Habitats)</span>
                        </label>

                        <label class="radio-option">
                            <input type="radio" name="grade" value="grade5" id="grade5">
                            <span class="radio-label">◉ Grade 5 (Water Cycle)</span>
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
        </form>

        <div class="back-link">
            <a href="teacher-dashboard.html">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                document.getElementById('topicName').value = file.name;
            }
        }

        function handleSubmit(event) {
            event.preventDefault();
            const topicName = document.getElementById('topicName').value;
            const selectedGrade = document.querySelector('input[name="grade"]:checked');
            
            if (topicName && selectedGrade) {
                alert('Video lesson uploaded successfully!\nTopic: ' + topicName + '\nGrade: ' + selectedGrade.nextElementSibling.textContent);
                window.location.href = 'teacher-dashboard.html';
            }
        }
    </script>
</body>
</html>

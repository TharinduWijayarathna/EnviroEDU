<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Builder Game - EnviroEdu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #5a6268;
            transform: translateX(-3px);
        }

        .title {
            color: #2c3e50;
            font-size: 1.8em;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .instruction {
            text-align: center;
            color: #6c757d;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .habitats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .habitat-card {
            background: #f8f9fa;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            min-height: 200px;
            transition: all 0.3s ease;
        }

        .habitat-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .habitat-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .habitat-name {
            color: #2c3e50;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .animals-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .animals-title {
            color: #2c3e50;
            font-size: 1.1em;
            margin-bottom: 15px;
            text-align: center;
        }

        .animals-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            justify-items: center;
        }

        .animal-item {
            font-size: 2em;
            cursor: grab;
            padding: 10px;
            background: white;
            border-radius: 8px;
            border: 2px solid #dee2e6;
            transition: all 0.3s ease;
        }

        .animal-item:hover {
            transform: scale(1.1);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .animal-item:active {
            cursor: grabbing;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .score-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2c3e50;
            font-size: 1.1em;
            font-weight: 600;
        }

        .points-icon {
            color: #667eea;
            font-size: 1.3em;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .habitats-grid {
                grid-template-columns: 1fr;
            }

            .animals-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='student-dashboard.html'">
                ◀ Back
            </button>
            <h1 class="title">Plant Builder Game</h1>
        </div>

        <p class="instruction">Match the animals to their correct habitats!</p>

        <div class="habitats-grid">
            <div class="habitat-card">
                <div class="habitat-icon">🌿</div>
                <div class="habitat-name">Pond</div>
                <div class="drop-zone" id="pond"></div>
            </div>

            <div class="habitat-card">
                <div class="habitat-icon">🌳</div>
                <div class="habitat-name">Forest</div>
                <div class="drop-zone" id="forest"></div>
            </div>

            <div class="habitat-card">
                <div class="habitat-icon">🏞️</div>
                <div class="habitat-name">Desert</div>
                <div class="drop-zone" id="desert"></div>
            </div>
        </div>

        <div class="animals-section">
            <div class="animals-title">Guess the acte: 🐘 🦆 💎 💧 🏖️ 🪨</div>
            <div class="animals-grid">
                <div class="animal-item" draggable="true">🐘</div>
                <div class="animal-item" draggable="true">🦆</div>
                <div class="animal-item" draggable="true">💎</div>
                <div class="animal-item" draggable="true">💧</div>
                <div class="animal-item" draggable="true">🏖️</div>
                <div class="animal-item" draggable="true">🪨</div>
            </div>
        </div>

        <button class="submit-btn" onclick="checkAnswers()">Submit</button>

        <div class="score-section">
            <div class="score-item">
                <span class="points-icon">💧</span>
                <span>10 Points</span>
            </div>
            <div class="score-item">
                <span>|</span>
            </div>
            <div class="score-item">
                <span>Level 2</span>
            </div>
        </div>
    </div>

    <script>
        // Add drag and drop functionality
        const animals = document.querySelectorAll('.animal-item');
        const dropZones = document.querySelectorAll('.drop-zone');

        animals.forEach(animal => {
            animal.addEventListener('dragstart', dragStart);
        });

        dropZones.forEach(zone => {
            zone.addEventListener('dragover', dragOver);
            zone.addEventListener('drop', drop);
        });

        function dragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.textContent);
        }

        function dragOver(e) {
            e.preventDefault();
        }

        function drop(e) {
            e.preventDefault();
            const data = e.dataTransfer.getData('text/plain');
            const animal = Array.from(animals).find(a => a.textContent === data);
            if (animal) {
                e.target.appendChild(animal.cloneNode(true));
            }
        }

        function checkAnswers() {
            alert('Great effort! Your habitat matches have been recorded.');
            // In a real game, this would check if animals are in correct habitats
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - EnviroEdu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #f0f0f0;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2em;
            margin-bottom: 15px;
        }

        .welcome {
            color: #34495e;
            font-size: 1.8em;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .main-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .action-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border-color: #667eea;
        }

        .action-icon {
            font-size: 3.5em;
            margin-bottom: 15px;
            color: #667eea;
        }

        .action-card h3 {
            color: #2c3e50;
            font-size: 1.3em;
            font-weight: 600;
        }

        .progress-section {
            margin-bottom: 40px;
        }

        .progress-section h2 {
            color: #2c3e50;
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 25px;
            height: 35px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 60%;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1em;
            transition: width 0.5s ease;
        }

        .achievements-section {
            margin-top: 40px;
        }

        .achievements-section h2 {
            color: #2c3e50;
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .achievement-badge {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .achievement-badge:hover {
            transform: scale(1.05);
        }

        .badge-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .badge-name {
            color: #2c3e50;
            font-weight: 600;
            font-size: 1em;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .main-actions {
                grid-template-columns: 1fr;
            }

            .achievements-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Student Dashboard</h1>
        </div>

        <h2 class="welcome">Welcome, Aanya!</h2>

        <div class="main-actions">
            <div class="action-card" onclick="window.location.href='video-lesson.html'">
                <div class="action-icon">▶️</div>
                <h3>Watch Video Lesson</h3>
            </div>

            <div class="action-card" onclick="window.location.href='quiz-game.html'">
                <div class="action-icon">🎮</div>
                <h3>Play Games & Quizzes</h3>
            </div>
        </div>

        <div class="progress-section">
            <h2>Your Progress: 60%</h2>
            <div class="progress-bar-container">
                <div class="progress-bar">60%</div>
            </div>
        </div>

        <div class="achievements-section">
            <h2>Achievements</h2>
            <div class="achievements-grid">
                <div class="achievement-badge">
                    <div class="badge-icon">♻️</div>
                    <div class="badge-name">Eco Hero</div>
                </div>

                <div class="achievement-badge">
                    <div class="badge-icon">🌱</div>
                    <div class="badge-name">Water Saver</div>
                </div>

                <div class="achievement-badge">
                    <div class="badge-icon">🐾</div>
                    <div class="badge-name">Animal Friend</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

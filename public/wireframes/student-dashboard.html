<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wireframe: Student dashboard</title>
  <link rel="stylesheet" href="css/wireframe.css">
</head>
<body class="wf-page">
  <header class="wf-header">
    <div class="wf-logo"></div>
    <nav class="wf-nav">
      <a href="student-badges.html">🏆 3 Badges</a>
      <span>Hi, Alex! 👋</span>
      <a href="index.html" class="wf-btn">Leave</a>
    </nav>
  </header>
  <main class="wf-main" style="display:flex;align-items:center;justify-content:center;min-height:60vh;position:relative;">
    <button type="button" class="wf-btn" style="position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;font-size:1.5rem;z-index:10;" title="EduBuddy">🤖</button>
    <div class="wf-card" style="max-width:420px;width:100%;">
      <h1 style="margin:0 0 8px;">Hi, Alex! 👋</h1>
      <p style="margin:0 0 4px;color:#666;font-size:0.9rem;">Class: Grade 4A</p>
      <p style="margin:0 0 20px;color:#666;">Choose where to go.</p>
      <div class="wf-grid" style="grid-template-columns:1fr;gap:1rem;">
        <a href="student-topics.html" class="wf-card" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px;">
          <span style="font-size:2rem;">📚</span>
          <span style="flex:1;">Topics</span>
          <span>→</span>
        </a>
        <a href="student-games.html" class="wf-card" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px;">
          <span style="font-size:2rem;">🎮</span>
          <span style="flex:1;">Games</span>
          <span>→</span>
        </a>
        <a href="student-quizzes.html" class="wf-card" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:12px;">
          <span style="font-size:2rem;">📝</span>
          <span style="flex:1;">Quizzes</span>
          <span>→</span>
        </a>
      </div>
    </div>
  </main>
</body>
</html>

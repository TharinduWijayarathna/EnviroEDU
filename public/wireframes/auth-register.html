<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wireframe: Register</title>
  <link rel="stylesheet" href="css/wireframe.css">
</head>
<body class="wf-page">
  <div class="wf-center">
    <div class="wf-form-card" style="max-width:480px;">
      <div class="wf-placeholder wf-logo" style="margin:0 auto 16px;width:140px;height:56px;"></div>
      <h2>Register as Teacher</h2>
      <form>
        <div class="wf-form-group">
          <label class="wf-label">Name</label>
          <input type="text" class="wf-input" style="max-width:100%;">
        </div>
        <div class="wf-form-group">
          <label class="wf-label">Email</label>
          <input type="email" class="wf-input" style="max-width:100%;">
        </div>
        <div class="wf-form-group">
          <label class="wf-label">Password</label>
          <input type="password" class="wf-input" style="max-width:100%;">
        </div>
        <div class="wf-form-group">
          <label class="wf-label">School code (optional)</label>
          <input type="text" class="wf-input" placeholder="From your school" style="max-width:100%;">
        </div>
        <button type="submit" class="wf-btn wf-btn-primary" style="width:100%;">Register</button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:0.9rem;"><a href="auth-login.html">Already have an account? Log in</a></p>
    </div>
  </div>
</body>
</html>

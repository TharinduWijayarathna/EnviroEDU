<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wireframe: Login</title>
  <link rel="stylesheet" href="css/wireframe.css">
</head>
<body class="wf-page">
  <div class="wf-center">
    <div class="wf-form-card">
      <div class="wf-placeholder wf-logo" style="margin:0 auto 16px;width:140px;height:56px;"></div>
      <h2>Log in as Teacher</h2>
      <form>
        <div class="wf-form-group">
          <label class="wf-label">Email</label>
          <input type="email" class="wf-input" placeholder="you@school.edu" style="max-width:100%;">
        </div>
        <div class="wf-form-group">
          <label class="wf-label">Password</label>
          <input type="password" class="wf-input" placeholder="••••••••" style="max-width:100%;">
        </div>
        <div class="wf-form-group">
          <label><input type="checkbox"> Remember me</label>
        </div>
        <button type="submit" class="wf-btn wf-btn-primary" style="width:100%;">Sign in</button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:0.9rem;">New here? <a href="auth-register.html">Register as Teacher</a></p>
      <p style="text-align:center;margin-top:8px;font-size:0.9rem;"><a href="auth-login-choose.html">← Different role</a> · <a href="landing-home.html">Back to home</a></p>
    </div>
  </div>
</body>
</html>
